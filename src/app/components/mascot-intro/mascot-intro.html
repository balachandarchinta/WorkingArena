<div class="intro-container fixed inset-0 z-[100] flex flex-col items-center justify-center bg-ivory overflow-hidden p-8">
  <!-- Mascot Area -->
  <div class="relative w-48 h-48 mb-12 flex items-center justify-center">
    <!-- Pulsing Rings -->
    <div #rings class="absolute inset-0 flex items-center justify-center">
      <div class="pulse-ring absolute w-48 h-48 border-2 border-crimson-light/20 rounded-full"></div>
      <div class="pulse-ring absolute w-48 h-48 border-2 border-crimson-light/10 rounded-full"></div>
      <div class="pulse-ring absolute w-48 h-48 border-2 border-crimson-light/5 rounded-full"></div>
    </div>
    
    <!-- Spinning Ball (SVG Mascot) -->
    <svg #ball viewBox="0 0 100 100" class="w-32 h-32 z-10 drop-shadow-2xl">
      <circle cx="50" cy="50" r="45" fill="#DC2626" />
      <!-- Ball Seam -->
      <path d="M5,50 Q50,40 95,50" fill="none" stroke="white" stroke-width="2" />
      <path d="M5,55 Q50,45 95,55" fill="none" stroke="white" stroke-width="1.5" stroke-dasharray="2,2" />
      <path d="M5,45 Q50,35 95,45" fill="none" stroke="white" stroke-width="1.5" stroke-dasharray="2,2" />
    </svg>
  </div>

  <h1 class="text-4xl md:text-6xl font-black mb-8 text-night tracking-tight text-center">
    CRICKET <span class="text-crimson-base">ARENA</span>
  </h1>

  <!-- Rules Grid -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-4xl mb-12">
    <div *ngFor="let rule of rules" class="rule-card p-6 bg-warm-white border border-night/5 rounded-xl shadow-sm hover:border-crimson-light/30 transition-colors">
      <h3 class="text-lg font-bold mb-2 flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-crimson-base"></span>
        {{ rule.title }}
      </h3>
      <p class="text-sm text-night/60 leading-relaxed font-ui">{{ rule.desc }}</p>
    </div>
  </div>

  <!-- CTA Button -->
  <button (click)="enterArena()" class="btn-primary group relative overflow-hidden px-12 py-4 text-xl">
    <span class="relative z-10 italic font-display">Enter the Arena</span>
    <div class="absolute inset-0 bg-white/10 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
  </button>
</div>
