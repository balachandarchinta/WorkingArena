<div class="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-700">
  <div class="flex flex-col gap-2">
    <h1 class="text-3xl font-black italic tracking-tight">ADMIN PANEL</h1>
    <p class="text-[0.85rem] text-night/50 font-ui uppercase tracking-widest font-bold">Authority Level: Admin Creator</p>
  </div>

  <!-- Match Management -->
  <div class="card-premium space-y-6">
    <div class="flex justify-between items-center">
      <h3 class="text-xl font-bold">Live Match Control</h3>
      <button class="btn-primary py-2 text-xs italic">Add New Match</button>
    </div>

    <div class="space-y-4">
      <div class="p-4 bg-paper rounded-xl border border-night/5 flex items-center justify-between">
        <div class="flex items-center gap-4">
          <div class="w-10 h-10 bg-night rounded-full flex items-center justify-center text-xs text-white">IND</div>
          <div class="font-bold">vs</div>
          <div class="w-10 h-10 bg-night rounded-full flex items-center justify-center text-xs text-white">AUS</div>
        </div>
        
        <div class="flex items-center gap-2">
          <button class="px-4 py-1.5 bg-crimson-base/10 text-crimson-base rounded-full text-[0.7rem] font-bold border border-crimson-base/20 hover:bg-crimson-base hover:text-white transition-all">Update Result</button>
          <button class="px-4 py-1.5 bg-night text-white rounded-full text-[0.7rem] font-bold hover:scale-105 transition-all">Trigger Simulation</button>
        </div>
      </div>
    </div>
  </div>

  <!-- System Triggers -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <!-- XP & Badges -->
    <div class="card-premium">
      <h3 class="text-lg font-bold mb-4">Manual Awards</h3>
      <div class="space-y-4">
        <div class="space-y-1">
          <label class="text-[0.65rem] font-mono uppercase text-night/40">User ID</label>
          <input type="text" placeholder="UID: 48f9z..." class="w-full bg-paper rounded-lg px-4 py-2 text-sm outline-none border border-night/5">
        </div>
        <div class="grid grid-cols-2 gap-2">
           <button class="w-full py-2 bg-gold-mid/20 text-gold-ink border border-gold-border/30 rounded-lg text-xs font-bold font-mono">Award 500 XP</button>
           <button class="w-full py-2 bg-crimson-pale text-crimson-ink border border-crimson-border/30 rounded-lg text-xs font-bold font-mono">Grant Badge</button>
        </div>
      </div>
    </div>

    <!-- Notification Engine -->
    <div class="card-premium flex flex-col justify-between">
      <div>
        <h3 class="text-lg font-bold mb-1">FCM Notification</h3>
        <p class="text-[0.7rem] text-night/40 font-ui mb-4">Broadcast to all active users</p>
        <textarea placeholder="Match starts in 10 minutes! Lock in your picks now." class="w-full bg-paper rounded-lg px-4 py-3 text-sm outline-none border border-night/5 h-20 resize-none font-ui"></textarea>
      </div>
      <button class="w-full btn-primary py-3 text-sm italic mt-4 shadow-lg shadow-crimson-base/20">Send Push Notification</button>
    </div>
  </div>

  <!-- Infrastructure Status -->
  <div class="space-y-4">
    <h3 class="text-[0.75rem] font-mono uppercase tracking-[0.2em] text-night/40">System Health</h3>
    <div class="grid grid-cols-3 gap-4">
      <div class="p-4 bg-sage-pale rounded-xl border border-sage-border/30 text-center">
        <p class="text-[0.6rem] font-mono uppercase text-sage-ink/40 mb-1">Functions</p>
        <p class="text-sm font-bold text-sage-ink">Healthy</p>
      </div>
      <div class="p-4 bg-sage-pale rounded-xl border border-sage-border/30 text-center">
        <p class="text-[0.6rem] font-mono uppercase text-sage-ink/40 mb-1">Gemini Proxy</p>
        <p class="text-sm font-bold text-sage-ink">Healthy</p>
      </div>
      <div class="p-4 bg-sage-pale rounded-xl border border-sage-border/30 text-center">
        <p class="text-[0.6rem] font-mono uppercase text-sage-ink/40 mb-1">Firestore</p>
        <p class="text-sm font-bold text-sage-ink">Active</p>
      </div>
    </div>
  </div>
</div>
