<div class="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-700">
  <div class="flex flex-col gap-2">
    <h1 class="text-3xl font-black italic tracking-tight">Lock In Your Predictions</h1>
    <p class="text-[0.85rem] text-night/50 font-ui">Match: IND vs AUS • Pot: 1,500 XP Total</p>
  </div>

  <!-- Prediction Cards -->
  <div class="space-y-6">
    <!-- Match Winner -->
    <div class="card-premium group hover:border-crimson-light/20 transition-all">
      <div class="flex justify-between items-start mb-6">
        <div>
          <h3 class="text-xl font-bold">Match Winner</h3>
          <p class="text-[0.7rem] font-mono text-night/40 uppercase">High Confidence • 100 XP</p>
        </div>
        <div class="px-3 py-1 bg-gold-pale text-gold-ink rounded-full text-[0.65rem] font-mono font-bold border border-gold-border">
          +100 XP
        </div>
      </div>
      
      <div class="grid grid-cols-2 gap-4">
        <button class="flex flex-col items-center gap-4 p-6 rounded-xl border-1.5 border-night/5 hover:border-crimson-base hover:bg-crimson-pale/50 transition-all group/btn">
          <img src="https://flagcdn.com/in.svg" class="w-16 h-10 object-cover rounded-sm shadow-sm group-hover/btn:scale-110 transition-transform" alt="IND">
          <div class="text-center">
            <p class="font-bold">India</p>
            <p class="text-[0.7rem] font-mono text-night/40 italic">Odds: 1.85</p>
          </div>
        </button>
        <button class="flex flex-col items-center gap-4 p-6 rounded-xl border-1.5 border-night/5 hover:border-crimson-base hover:bg-crimson-pale/50 transition-all group/btn">
          <img src="https://flagcdn.com/au.svg" class="w-16 h-10 object-cover rounded-sm shadow-sm group-hover/btn:scale-110 transition-transform" alt="AUS">
          <div class="text-center">
            <p class="font-bold">Australia</p>
            <p class="text-[0.7rem] font-mono text-night/40 italic">Odds: 2.10</p>
          </div>
        </button>
      </div>
    </div>

    <!-- Top Scorer -->
    <div class="card-premium">
      <div class="flex justify-between items-start mb-6">
        <div>
          <h3 class="text-xl font-bold">Top Scorer</h3>
          <p class="text-[0.7rem] font-mono text-night/40 uppercase">Performance • 250 XP</p>
        </div>
        <div class="px-3 py-1 bg-gold-pale text-gold-ink rounded-full text-[0.65rem] font-mono font-bold border border-gold-border">
          +250 XP
        </div>
      </div>
      
      <div class="space-y-4">
        <div class="flex items-center gap-4 p-3 bg-paper rounded-lg">
          <select class="flex-grow bg-transparent font-ui text-sm outline-none font-semibold">
            <option>Virat Kohli</option>
            <option>Rohit Sharma</option>
            <option>Travis Head</option>
            <option>Glenn Maxwell</option>
          </select>
          <div class="h-6 w-[1px] bg-night/10"></div>
          <div class="flex items-center gap-2">
            <span class="text-[0.7rem] font-mono uppercase text-night/40">Target</span>
            <input type="number" placeholder="50" class="w-16 bg-ivory rounded border border-night/10 px-2 py-1 text-sm font-bold">
          </div>
        </div>
      </div>
    </div>

    <!-- Score Range Slider (Simplified) -->
    <div class="card-premium">
       <div class="flex justify-between items-start mb-6">
        <div>
          <h3 class="text-xl font-bold">Innings Score</h3>
          <p class="text-[0.7rem] font-mono text-night/40 uppercase">Precision • 150 XP</p>
        </div>
        <div class="px-3 py-1 bg-gold-pale text-gold-ink rounded-full text-[0.65rem] font-mono font-bold border border-gold-border">
          +150 XP
        </div>
      </div>
      
      <div class="space-y-6 px-2">
        <div class="flex justify-between text-[0.7rem] font-mono text-night/40 uppercase">
          <span>140</span>
          <span class="text-night font-bold">Estimated: 185 - 195</span>
          <span>240</span>
        </div>
        <input type="range" min="140" max="240" class="w-full h-1.5 bg-paper rounded-lg appearance-none cursor-pointer accent-crimson-base">
      </div>
    </div>
  </div>

  <!-- Lock In CTA -->
  <div class="sticky bottom-8 left-0 right-0 z-20 px-4">
    <button class="w-full btn-primary py-5 text-xl shadow-2xl shadow-crimson-base/30 flex items-center justify-center gap-3">
      <span class="italic font-display">Lock In Predictions</span>
      <span class="text-[0.8rem] font-mono bg-white/20 px-2 py-0.5 rounded">+500 XP Guaranteed</span>
    </button>
  </div>
</div>
